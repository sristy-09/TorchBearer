services:
  - type: web
    name: ai-recommendation-service
    runtime: python
    plan: free

    buildCommand: "pip install -r requirements.txt"

    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9

      - key: MONGO_URI
        sync: false

      - key: MONGO_DB_NAME
        value: test